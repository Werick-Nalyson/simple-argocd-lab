name: Build, Scan and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/build-push.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/argocdlab-app

jobs:
  # ──────────────────────────────────────────────
  # Job 1: build e publica a imagem no Docker Hub
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: scan de segurança com Trivy — bloqueia o deploy se houver
  #         vulnerabilidades CRITICAL ou HIGH com correção disponível
  # ──────────────────────────────────────────────────────────────────────
  scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Trivy HTML template
        run: |
          mkdir -p .trivy
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o .trivy/html.tpl

      # ── 1. Scan da imagem Docker (CVEs nos pacotes do OS e dependências) ──
      - name: Scan image — table output (summary no log)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.image-tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # ignora CVEs sem patch disponível
          exit-code: 1           # falha o job se encontrar CRITICAL ou HIGH fixável

      - name: Scan image — HTML report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.image-tag }}
          format: template
          template: '@.trivy/html.tpl'
          output: trivy-image.html
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Scan image — JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.image-tag }}
          format: json
          output: trivy-image.json
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      # ── 2. Scan de IaC (Dockerfile + manifestos Kubernetes) ──
      - name: Scan IaC — table output (summary no log)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0           # reporta mas não bloqueia o deploy por má config

      - name: Scan IaC — HTML report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: template
          template: '@.trivy/html.tpl'
          output: trivy-iac.html
          severity: CRITICAL,HIGH,MEDIUM

      - name: Scan IaC — JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-iac.json
          severity: CRITICAL,HIGH,MEDIUM

      # ── 3. Salva os relatórios como artefatos do workflow ──
      - name: Upload scan reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports-sha-${{ needs.build-and-push.outputs.image-tag }}
          path: |
            trivy-image.html
            trivy-image.json
            trivy-iac.html
            trivy-iac.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: atualiza kustomization.yaml e faz push — ArgoCD sincroniza
  #         Este job só roda se o scan não encontrar vulnerabilidades
  # ──────────────────────────────────────────────────────────────────────
  update-manifests:
    name: Update Manifests (GitOps)
    runs-on: ubuntu-latest
    needs: [build-and-push, scan]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in kustomization
        run: |
          cd k8s
          kustomize edit set image ${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.image-tag }}

      - name: Commit and push kustomization update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore: deploy image sha-${{ needs.build-and-push.outputs.image-tag }} [skip ci]"
          git push
